<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea3500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c0d3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left orange arc (back, drawn first so blue overlaps at cross) -->
  <!-- Right blue loop -->
  <path
    d="M 130 60
       C 130 30, 175 20, 185 45
       C 192 60, 192 60, 185 75
       C 175 100, 130 90, 130 60 Z"
    fill="none"
    stroke="url(#blueGrad)"
    stroke-width="13"
    stroke-linecap="round"
  />

  <!-- Left orange loop - drawn on top so it crosses in front -->
  <path
    d="M 130 60
       C 110 35, 55 15, 30 42
       C 15 58, 20 72, 45 80
       C 65 86, 105 78, 130 60"
    fill="none"
    stroke="url(#orangeGrad)"
    stroke-width="13"
    stroke-linecap="round"
  />

  <!-- Cross-over: orange over blue at intersection -->
  <path
    d="M 118 47 C 123 52, 127 57, 130 62"
    fill="none"
    stroke="url(#orangeGrad)"
    stroke-width="13"
    stroke-linecap="round"
  />
</svg>
